- title: "Research Unit Tests"
  note: "A library of structured quality checks for academic papers — analogous to unit tests in software engineering. Tests range from deterministic checks (does the replication package run?) to judgment calls (is the contribution interesting?), organized by methodology and designed for AI agents. Open source; community contributions welcome."
